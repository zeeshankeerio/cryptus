name: 24/7 Intelligent RSI Scanner

on:
  schedule:
    # GitHub's smallest reliable interval is every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  scan:
    name: Execute 1-Minute Alert Scans
    runs-on: ubuntu-latest
    steps:
      - name: Professional Scanner Loop
        run: |
          # Support both Secrets and Repository Variables for APP_URL
          RAW_URL="${{ secrets.APP_URL }}"
          if [ -z "$RAW_URL" ]; then RAW_URL="${{ vars.APP_URL }}"; fi

          # Strip any trailing slash from URL for clean concatenation
          BASE_URL=$(echo "$RAW_URL" | sed 's/\/$//')
          
          if [ -z "$BASE_URL" ]; then
            echo "::error::APP_URL is missing! Please add it to GitHub Secrets or Variables."
            exit 1
          fi

          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET is missing! Please add it to GitHub Secrets."
            exit 1
          fi

          echo "Starting Professional RSI Scan Cycle for $BASE_URL..."
          
          for i in {1..5}
          do
            echo "Scan #$i starting at $(date)"
            
            curl -X POST "$BASE_URL/api/cron/check-alerts" \
                 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
                 -H "Content-Type: application/json" \
                 --fail --silent --show-error
            
            if [ $i -lt 5 ]; then
              echo "Waiting 60 seconds for next cycle..."
              sleep 60
            fi
          done
          
          echo "Scan Cycle Complete."
